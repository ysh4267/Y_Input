name: release

# main 에 푸시될 때마다 단일 exe 를 빌드해 GitHub Release 를 자동 생성한다.
# 버전 규칙: VERSION 파일(MAJOR.MINOR.PATCH)을 기준선으로,
#   - PATCH 는 기존 태그를 보고 자동 +1 (평소엔 VERSION 을 건드릴 필요 없음)
#   - MINOR/MAJOR 점프는 VERSION 을 통째로(예: 0.3.0) 덮어쓰면 그 값부터 다시 시작
# 커밋 메시지에 [skip ci] 가 있으면 빌드/릴리즈를 건너뛴다.

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release          # 동시에 두 릴리즈가 같은 패치 번호를 잡지 않도록 직렬화
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0        # 기존 태그를 봐야 다음 PATCH 를 계산할 수 있음

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Compute next version
        id: ver
        shell: pwsh
        run: |
          $base = (Get-Content VERSION -Raw).Trim()
          if ($base -notmatch '^(\d+)\.(\d+)\.(\d+)$') { throw "VERSION must be MAJOR.MINOR.PATCH, got '$base'" }
          $maj = [int]$Matches[1]; $min = [int]$Matches[2]; $basePatch = [int]$Matches[3]

          git fetch --tags --quiet
          $prefix = "v$maj.$min."
          $maxPatch = -1
          foreach ($t in (git tag --list "$prefix*")) {
            if ($t -match ("^v$maj\.$min\.(\d+)$")) {
              $n = [int]$Matches[1]
              if ($n -gt $maxPatch) { $maxPatch = $n }
            }
          }
          # 기존 태그보다 항상 한 칸 위, 단 VERSION 의 PATCH 보다는 낮아지지 않도록(수동 점프 존중)
          $patch = [Math]::Max($maxPatch + 1, $basePatch)
          $version = "$maj.$min.$patch"
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          Write-Host "Next release: $tag (VERSION=$base, latest patch=$maxPatch)"

      - name: Publish single-file exe
        shell: pwsh
        run: |
          dotnet publish src/YInput.Host/YInput.Host.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:InformationalVersion=${{ steps.ver.outputs.tag }} `
            -o publish --nologo -v minimal
          if (-not (Test-Path publish/YInput.exe)) { throw "publish/YInput.exe not found" }
          # 포터블 배포본(설치본과 동일 바이너리, 파일명만 다름 → 앱이 파일명으로 포터블/설치 구분).
          Copy-Item publish/YInput.exe publish/YInput-Portable.exe -Force

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @'
          # Y_Input — 드라이버급 입력 매크로

          키보드·마우스·게임패드 입력을 **드라이버 레벨**에서 발생시키는 매크로 프로그램입니다.
          일반 `SendInput`과 달리 OS 입력 스택 하위에 주입하므로 `injected` 플래그가 붙지 않아,
          합성 입력을 무시하는 일부 응용에서도 동작합니다.

          - 키보드·마우스: Interception 드라이버 / 게임패드: ViGEmBus 가상 Xbox360
          - 시스템 트레이 상주 + 기본 브라우저(localhost) 웹 UI로 제어
          - 녹화·재생, 전역 핫키 트리거, 인앱 자동 업데이트 지원

          ## 다운로드

          | 파일 | 설명 |
          | --- | --- |
          | `YInput.exe` | **설치본** — 첫 실행 시 자동 설치 + 시작 메뉴 등록 |
          | `YInput-Portable.exe` | **포터블** — 제자리 실행, 설치 안 함 |

          두 파일 모두 관리자 권한이 필요합니다(커널 드라이버 설치·사용).
          '@
          Set-Content -Path notes.md -Value $notes -Encoding utf8
          gh release create ${{ steps.ver.outputs.tag }} publish/YInput.exe publish/YInput-Portable.exe `
            --title "Y_Input ${{ steps.ver.outputs.tag }}" `
            --target ${{ github.sha }} `
            --notes-file notes.md
